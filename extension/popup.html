<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 250px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0d14;
    color: #e2e8f0;
    margin: 0;
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .logo {
    font-size: 20px;
  }
  h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
  }
  p {
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .status {
    background: rgba(79, 142, 247, 0.1);
    border: 1px solid rgba(79, 142, 247, 0.2);
    border-radius: 6px;
    padding: 8px;
    font-size: 11px;
    color: #4f8ef7;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="header">
    <span class="logo">🎯</span>
    <h3>Job Prep Intelligence</h3>
  </div>
  <p>Open any job posting on <strong>LinkedIn</strong>, <strong>Indeed</strong>, or <strong>Naukri</strong>. Click the <strong>"Prepare with AI"</strong> button on the page to automatically generate your interview preparation plan.</p>
  <div class="status">Assistant is active</div>
</body>
</html>
